name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/elegant-lamport-pcI34
      - claude/intelligent-mayer-pSums
      - claude/practical-darwin-kw4qyg

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Pre-generate route tree
        run: node scripts/generate-routes.mjs
      - name: Build
        run: npm run build
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
