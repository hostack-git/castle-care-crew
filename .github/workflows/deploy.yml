name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/elegant-lamport-pcI34
      - claude/intelligent-mayer-pSums

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Regenerate route tree
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const routesDir = './src/routes';
          const files = fs.readdirSync(routesDir).filter(f => f.endsWith('.tsx') || f.endsWith('.ts'));
          console.log('Routes found:', files.join(', '));
          " || echo "Route scan complete"
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          TANSTACK_ROUTER_CODEGEN: "false"
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
