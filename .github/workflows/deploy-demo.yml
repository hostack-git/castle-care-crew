name: Deploy Demo to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/blissful-bohr-wrtkgj

jobs:
  deploy-demo:
    runs-on: ubuntu-latest
    name: Deploy Demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Pre-generate route tree
        run: node scripts/generate-routes.mjs
      - name: Build (demo mode)
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'
          VITE_PROPERTY_ID: 'de000000-0000-0000-0000-000000000001'
      - name: Patch wrangler config for demo
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
            cfg.name = 'torridonia-demo';
            cfg.routes = [{ pattern: 'demo.torridonia.com/staffapp/*', zone_name: 'torridonia.com' }];
            fs.writeFileSync('dist/server/wrangler.json', JSON.stringify(cfg, null, 2));
          "
      - name: Deploy demo to Cloudflare Workers
        run: npx wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
